name: "CI | Quality Checks"

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  frontend:
    name: "Frontend | Lint and build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Build production frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3001' }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY || 'pk_test_placeholder' }}
        run: npm run build

      - name: Validate build output
        run: test -f dist/index.html

      - name: Frontend summary
        if: always()
        run: |
          {
            echo "## Frontend"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Dependencies | completed |"
            echo "| ESLint | completed |"
            echo "| Vite build | completed |"
            echo "| Output | \`frontend/dist/index.html\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  backend:
    name: "Backend | Prisma validation"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Backend summary
        if: always()
        run: |
          {
            echo "## Backend"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Dependencies | completed |"
            echo "| Prisma schema | completed |"
            echo "| Prisma Client | completed |"
          } >> "$GITHUB_STEP_SUMMARY"
