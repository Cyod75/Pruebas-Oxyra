# =============================================================================
# Oxyra — Production Deployment
# Trigger: push to main · manual dispatch
# Flow: Build frontend → RSync dist → Update backend on VPS → Health check
# Secrets setup: .github/DEPLOYMENT.md
# =============================================================================

name: 🚀 Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: "Deploy frontend (dist → VPS)"
        type: boolean
        default: true
      deploy_backend:
        description: "Update backend (git pull + PM2)"
        type: boolean
        default: true
      run_prisma_push:
        description: "Run prisma db push on VPS (schema sync — use with care)"
        type: boolean
        default: false

run-name: "🚀 Deploy · ${{ github.event_name }} · ${{ github.sha }}"

concurrency:
  group: oxyra-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  FRONTEND_DIR: frontend
  BACKEND_DIR: Backend
  PM2_APP_NAME: oxyra-api
  ARTIFACT_NAME: oxyra-frontend-dist

jobs:
  # ===========================================================================
  build:
  # ===========================================================================
  build:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.deploy_frontend != false

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: 📥 Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build with Vite (production env)
        id: build
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
        run: npm run build

      - name: ✅ Verify dist output
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          test -f dist/index.html || (echo "::error::dist/index.html not found" && exit 1)
          echo "dist_size=$(du -sh dist | cut -f1)" >> "$GITHUB_OUTPUT"
        id: verify

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.FRONTEND_DIR }}/dist/
          retention-days: 3
          if-no-files-found: error

      - name: 📊 Build summary
        run: |
          {
            echo "## 🏗️ Frontend build"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Node | ${{ env.NODE_VERSION }} |"
            echo "| Artifact | \`${{ env.ARTIFACT_NAME }}\` |"
            echo "| API URL | \`${{ secrets.VITE_API_URL != '' && 'configured' || '⚠️ missing VITE_API_URL secret' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  deploy:
  # ===========================================================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://jordi.informaticamajada.es' }}

    steps:
      - name: 📥 Checkout (backend deploy script)
        uses: actions/checkout@v4
        sparse-checkout: |
          .github
          ${{ env.BACKEND_DIR }}

      - name: 📥 Download frontend artifact
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_frontend != false
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist-artifact/

      - name: 🔐 Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for var in VPS_HOST VPS_PORT VPS_SSH_PRIVATE_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing secret: $var — see .github/DEPLOYMENT.md"
              exit 1
            fi
          done
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 📤 RSync frontend to VPS
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_frontend != false
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/var/www/html/Oxyra' }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_USER:-}" ]; then
            echo "::error::Missing secret VPS_USER"
            exit 1
          fi
          TARGET="${VPS_DEPLOY_PATH%/}/frontend/dist"
          echo "→ Syncing to ${VPS_USER}@${VPS_HOST}:${TARGET}"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=yes" \
            dist-artifact/ \
            "${VPS_USER}@${VPS_HOST}:${TARGET}/"

      - name: 🟢 Update backend & reload PM2
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_backend != false
        uses: appleboy/ssh-action@v1.2.0
        env:
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/var/www/html/Oxyra' }}
          PM2_APP_NAME: ${{ vars.PM2_APP_NAME || env.PM2_APP_NAME }}
          RUN_PRISMA_PUSH: ${{ github.event_name == 'workflow_dispatch' && inputs.run_prisma_push && 'true' || 'false' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: VPS_DEPLOY_PATH,PM2_APP_NAME,RUN_PRISMA_PUSH
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${VPS_DEPLOY_PATH:-/var/www/html/Oxyra}"
            BACKEND_PATH="${DEPLOY_PATH}/Backend"
            PM2_NAME="${PM2_APP_NAME:-oxyra-api}"

            echo "════════════════════════════════════════"
            echo "  Oxyra — Backend deploy"
            echo "  Path: ${DEPLOY_PATH}"
            echo "════════════════════════════════════════"

            cd "${DEPLOY_PATH}"
            git fetch origin main
            git reset --hard origin/main

            cd "${BACKEND_PATH}"
            npm ci
            npx prisma generate

            if [ "${RUN_PRISMA_PUSH}" = "true" ]; then
              echo "⚠️  Running prisma db push..."
              npx prisma db push --skip-generate
            fi

            if pm2 describe "${PM2_NAME}" > /dev/null 2>&1; then
              pm2 reload "${PM2_NAME}" --update-env
            elif [ -f ecosystem.config.cjs ]; then
              pm2 start ecosystem.config.cjs --env production
              pm2 save
            else
              pm2 start server.js --name "${PM2_NAME}"
              pm2 save
            fi

            pm2 status "${PM2_NAME}"
            echo "✅ Backend deployed"

      - name: 🩺 Health check
        env:
          HEALTH_CHECK_URL: ${{ vars.HEALTH_CHECK_URL || format('{0}/api/health', vars.PRODUCTION_URL || 'https://jordi.informaticamajada.es') }}
        run: |
          set -euo pipefail
          URL="${HEALTH_CHECK_URL}"
          echo "Checking ${URL} ..."
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 15 "$URL" | grep -q '"status"'; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "::warning::Health check did not pass — deployment may still be propagating"
          exit 0

      - name: 📊 Deployment summary
        if: always()
        run: |
          {
            echo "## 🚀 Production deployment"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Commit | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Frontend | ${{ (github.event_name != 'workflow_dispatch' || inputs.deploy_frontend != false) && '✅' || '⏭️ skipped' }} |"
            echo "| Backend | ${{ (github.event_name != 'workflow_dispatch' || inputs.deploy_backend != false) && '✅' || '⏭️ skipped' }} |"
            echo "| URL | ${{ vars.PRODUCTION_URL || 'https://jordi.informaticamajada.es' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
