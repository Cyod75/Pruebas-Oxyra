name: "Oxyra | Production Deploy"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: "Build and publish frontend/dist"
        type: boolean
        default: true
      deploy_backend:
        description: "Pull backend code and reload PM2"
        type: boolean
        default: true
      run_prisma_push:
        description: "Run prisma db push on the VPS"
        type: boolean
        default: false

run-name: "Oxyra production deploy #${{ github.run_number }} | ${{ github.ref_name }} | by @${{ github.actor }}"

concurrency:
  group: oxyra-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  ARTIFACT_NAME: oxyra-frontend-dist

jobs:
  preflight:
    name: "1 | Release plan"
    runs-on: ubuntu-latest
    outputs:
      deploy_frontend: ${{ steps.plan.outputs.deploy_frontend }}
      deploy_backend: ${{ steps.plan.outputs.deploy_backend }}
      run_prisma_push: ${{ steps.plan.outputs.run_prisma_push }}

    steps:
      - name: Choose deployment scope
        id: plan
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_frontend=${{ inputs.deploy_frontend }}" >> "$GITHUB_OUTPUT"
            echo "deploy_backend=${{ inputs.deploy_backend }}" >> "$GITHUB_OUTPUT"
            echo "run_prisma_push=${{ inputs.run_prisma_push }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_frontend=true" >> "$GITHUB_OUTPUT"
            echo "deploy_backend=true" >> "$GITHUB_OUTPUT"
            echo "run_prisma_push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check VPS secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Write release plan summary
        run: |
          {
            echo "## Oxyra production deploy"
            echo ""
            echo "### Release plan"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Frontend | \`${{ steps.plan.outputs.deploy_frontend }}\` |"
            echo "| Backend | \`${{ steps.plan.outputs.deploy_backend }}\` |"
            echo "| Prisma db push | \`${{ steps.plan.outputs.run_prisma_push }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  build_frontend:
    name: "2A | Build React app"
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.deploy_frontend == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
        run: npm run build

      - name: Inspect dist output
        id: dist
        run: |
          test -f dist/index.html
          echo "size=$(du -sh dist | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "files=$(find dist -type f | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: frontend/dist/
          retention-days: 7
          if-no-files-found: error

      - name: Write frontend summary
        run: |
          {
            echo "## Frontend build"
            echo ""
            echo "| Detail | Value |"
            echo "| --- | --- |"
            echo "| Artifact | \`${{ env.ARTIFACT_NAME }}\` |"
            echo "| Size | \`${{ steps.dist.outputs.size }}\` |"
            echo "| Files | \`${{ steps.dist.outputs.files }}\` |"
            echo "| Base path | \`/Oxyra/\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  validate_backend:
    name: "2B | Validate API"
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.deploy_backend == 'true'
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Validate database schema
        run: npx prisma validate

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Write backend summary
        run: |
          {
            echo "## Backend validation"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Dependencies | ready |"
            echo "| Prisma schema | valid |"
            echo "| Prisma Client | generated |"
          } >> "$GITHUB_STEP_SUMMARY"

  production_gate:
    name: "3 | Production gate"
    runs-on: ubuntu-latest
    needs: [preflight, build_frontend, validate_backend]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.build_frontend.result == 'success' || needs.build_frontend.result == 'skipped') &&
      (needs.validate_backend.result == 'success' || needs.validate_backend.result == 'skipped')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://jordi.informaticamajada.es' }}

    steps:
      - name: Confirm production release
        run: |
          {
            echo "## Production gate"
            echo ""
            echo "Build and validation stages are ready for the VPS release."
          } >> "$GITHUB_STEP_SUMMARY"

  publish_frontend:
    name: "4A | Publish frontend"
    runs-on: ubuntu-latest
    needs: [preflight, build_frontend, validate_backend, production_gate]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.production_gate.result == 'success' &&
      needs.preflight.outputs.deploy_frontend == 'true' &&
      needs.build_frontend.result == 'success' &&
      (needs.validate_backend.result == 'success' || needs.validate_backend.result == 'skipped')

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist-artifact/

      - name: Open SSH channel
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/oxyra_deploy_key
          chmod 600 ~/.ssh/oxyra_deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync static files to Nginx
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/var/www/html/Oxyra' }}
        run: |
          set -euo pipefail
          target="${VPS_DEPLOY_PATH%/}/frontend/dist"
          ssh -i ~/.ssh/oxyra_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$target'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/oxyra_deploy_key -p ${VPS_PORT} -o StrictHostKeyChecking=yes" \
            dist-artifact/ \
            "${VPS_USER}@${VPS_HOST}:${target}/"

      - name: Write frontend deploy summary
        run: |
          {
            echo "## Frontend published"
            echo ""
            echo "| Target | Value |"
            echo "| --- | --- |"
            echo "| Server path | \`${{ vars.VPS_DEPLOY_PATH || '/var/www/html/Oxyra' }}/frontend/dist\` |"
            echo "| Method | \`rsync --delete\` |"
            echo "| Artifact | \`${{ env.ARTIFACT_NAME }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_backend:
    name: "4B | Reload API"
    runs-on: ubuntu-latest
    needs: [preflight, build_frontend, validate_backend, production_gate]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      needs.production_gate.result == 'success' &&
      needs.preflight.outputs.deploy_backend == 'true' &&
      needs.validate_backend.result == 'success' &&
      (needs.build_frontend.result == 'success' || needs.build_frontend.result == 'skipped')

    steps:
      - name: Pull code, install backend and reload PM2
        uses: appleboy/ssh-action@v1.2.0
        env:
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/var/www/html/Oxyra' }}
          PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'oxyra-api' }}
          RUN_PRISMA_PUSH: ${{ needs.preflight.outputs.run_prisma_push }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: VPS_DEPLOY_PATH,PM2_APP_NAME,RUN_PRISMA_PUSH
          script_stop: true
          script: |
            set -euo pipefail
            deploy_path="${VPS_DEPLOY_PATH:-/var/www/html/Oxyra}"
            backend_path="${deploy_path}/Backend"
            pm2_name="${PM2_APP_NAME:-oxyra-api}"

            echo "Oxyra backend deployment"
            echo "Path: ${deploy_path}"
            echo "PM2: ${pm2_name}"

            cd "$deploy_path"
            git fetch origin main
            git pull --ff-only origin main

            cd "$backend_path"
            npm ci
            npx prisma generate

            if [ "${RUN_PRISMA_PUSH}" = "true" ]; then
              npx prisma db push --skip-generate
            fi

            if pm2 describe "$pm2_name" >/dev/null 2>&1; then
              pm2 reload "$pm2_name" --update-env
            elif [ -f ecosystem.config.cjs ]; then
              pm2 start ecosystem.config.cjs --env production
            else
              pm2 start server.js --name "$pm2_name"
            fi

            pm2 save
            pm2 status "$pm2_name"

      - name: Write backend deploy summary
        run: |
          {
            echo "## Backend reloaded"
            echo ""
            echo "| Detail | Value |"
            echo "| --- | --- |"
            echo "| Server path | \`${{ vars.VPS_DEPLOY_PATH || '/var/www/html/Oxyra' }}/Backend\` |"
            echo "| PM2 app | \`${{ vars.PM2_APP_NAME || 'oxyra-api' }}\` |"
            echo "| Prisma db push | \`${{ needs.preflight.outputs.run_prisma_push }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  health_check:
    name: "5 | Health check"
    runs-on: ubuntu-latest
    needs: [preflight, publish_frontend, deploy_backend]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.publish_frontend.result == 'success' || needs.publish_frontend.result == 'skipped') &&
      (needs.deploy_backend.result == 'success' || needs.deploy_backend.result == 'skipped')

    steps:
      - name: Check public API
        env:
          HEALTH_CHECK_URL: ${{ vars.HEALTH_CHECK_URL || format('{0}/api/health', vars.PRODUCTION_URL || 'https://jordi.informaticamajada.es') }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if curl -fsS --max-time 15 "$HEALTH_CHECK_URL" | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt ${attempt} failed; retrying..."
            sleep 5
          done
          echo "::warning::Health check did not return status ok. Review PM2 and Nginx logs on the VPS."

      - name: Write health summary
        run: |
          {
            echo "## Health check"
            echo ""
            echo "| Check | URL |"
            echo "| --- | --- |"
            echo "| API status | \`${{ vars.HEALTH_CHECK_URL || format('{0}/api/health', vars.PRODUCTION_URL || 'https://jordi.informaticamajada.es') }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  release_summary:
    name: "6 | Release summary"
    runs-on: ubuntu-latest
    needs: [preflight, build_frontend, validate_backend, production_gate, publish_frontend, deploy_backend, health_check]
    if: always()

    steps:
      - name: Write final deploy card
        run: |
          {
            echo "## Oxyra release summary"
            echo ""
            echo "| Stage | Result |"
            echo "| --- | --- |"
            echo "| 1. Release plan | \`${{ needs.preflight.result }}\` |"
            echo "| 2A. React build | \`${{ needs.build_frontend.result }}\` |"
            echo "| 2B. API validation | \`${{ needs.validate_backend.result }}\` |"
            echo "| 3. Production gate | \`${{ needs.production_gate.result }}\` |"
            echo "| 4A. Frontend publish | \`${{ needs.publish_frontend.result }}\` |"
            echo "| 4B. API reload | \`${{ needs.deploy_backend.result }}\` |"
            echo "| 5. Health check | \`${{ needs.health_check.result }}\` |"
            echo ""
            echo "| Release | Value |"
            echo "| --- | --- |"
            echo "| Commit | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| Environment | [production](${{ vars.PRODUCTION_URL || 'https://jordi.informaticamajada.es' }}) |"
            echo "| Actor | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
